<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>\
  <link rel="stylesheet" href="style.css">
  <title>Add Product - Vesture</title>
  
</head>

<body class="min-h-screen w-full bg-linear-to-br from-sky-100 via-blue-100 to-amber-50  text-gray-800">
  <!-- Page Wrapper -->
  <div class="max-w-5xl mx-auto p-6 md:p-10  bg-linear-to-br from-sky-100 via-blue-100 to-amber-50">

    <!-- Header -->
    <div class="flex items-start justify-between gap-6 mb-8">
      <div>
        <h1 class="text-3xl md:text-4xl font-bold">Add Product</h1>
        <p class="text-gray-600 mt-2">
          Fill the form to register a new product in your shop.
        </p>
      </div>

      <!-- Back button (optional) -->
      <a href="myproduct.html"
         class="inline-flex items-center gap-2 rounded-lg border border-[#D8C3A5] bg-white px-4 py-2
                hover:bg-[#FFF3B0] transition">
        ← Back
      </a>
    </div>

    <!-- Card -->
    <div class="bg-white border border-gray-200 rounded-2xl shadow-sm">
      <!-- Card top accent -->
      <div class="h-4 rounded-t-2xl bg-linear-to-r from-[#C7E6FF] via-[#FFF3B0] to-[#D8C3A5]"></div>

      <div class="p-6 md:p-8">
        <!-- FORM -->
        <form action="myproduct.html" method="get" enctype="multipart/form-data" class="space-y-6">
          
          <!-- Row 1: Name + Price -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
              <label class="block text-sm font-medium mb-2" for="name">Product Name</label>
              <input
                id="name" name="name" type="text" required
                placeholder="e.g., Oversized Hoodie"
                class="w-full rounded-xl border border-gray-300 bg-white px-4 py-3
                       focus:outline-none focus:ring-2 focus:ring-[#C7E6FF]"
              />
            </div>

            <div>
              <label class="block text-sm font-medium mb-2" for="price">Price</label>
              <input
                id="price" name="price" type="number" step="0.01" min="0" required
                placeholder="e.g., 29.99"
                class="w-full rounded-xl border border-gray-300 bg-white px-4 py-3
                       focus:outline-none focus:ring-2 focus:ring-[#C7E6FF]"
              />
            </div>
          </div>

          <!-- Row 2: Color + Size -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
              <label class="block text-sm font-medium mb-2" for="color">Color</label>
              <input
                id="color" name="color" type="text" required
                placeholder="e.g., Pastel Blue"
                class="w-full rounded-xl border border-gray-300 bg-white px-4 py-3
                       focus:outline-none focus:ring-2 focus:ring-[#C7E6FF]"
              />
            </div>

            <div>
              <label class="block text-sm font-medium mb-2" for="size">Size</label>
              <select
                id="size" name="size" required
                class="w-full rounded-xl border border-gray-300 bg-white px-4 py-3
                       focus:outline-none focus:ring-2 focus:ring-[#C7E6FF]"
              >
                <option value="" selected disabled>Select size</option>
                <option>XS</option>
                <option>S</option>
                <option>M</option>
                <option>L</option>
                <option>XL</option>
                <option>XXL</option>
                <option>One Size</option>
              </select>
            </div>
          </div>

          <!-- Row 3: Quantity + Release Date -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
              <label class="block text-sm font-medium mb-2" for="quantity">Quantity</label>
              <input
                id="quantity" name="quantity" type="number" min="0" required
                placeholder="e.g., 50"
                class="w-full rounded-xl border border-gray-300 bg-white px-4 py-3
                       focus:outline-none focus:ring-2 focus:ring-[#C7E6FF]"
              />
            </div>

            <div>
              <label class="block text-sm font-medium mb-2" for="release_date">Release Date</label>
              <input
                id="release_date" name="release_date" type="date" required
                class="w-full rounded-xl border border-gray-300 bg-white px-4 py-3
                       focus:outline-none focus:ring-2 focus:ring-[#C7E6FF]"
              />
            </div>
          </div>

          <!-- Row 4: Shop ID + Category ID -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
              <label class="block text-sm font-medium mb-2" for="shop_id">Shop ID</label>
              <input
                id="shop_id" name="shop_id" type="hidden" min="1" required
                placeholder="e.g., 3"
                class="w-full rounded-xl border border-gray-300 bg-white px-4 py-3
                       focus:outline-none focus:ring-2 focus:ring-[#C7E6FF]"
              />
              <p class="text-xs text-gray-500 mt-2">
                (Later we can auto-fill this based on the logged-in manager.)
              </p>
            </div>

            <div>
              <label class="block text-sm font-medium mb-2" for="category_id">Category ID</label>
              <input
                id="category_id" name="category_id" type="hidden" min="1" required
                placeholder="e.g., 2"
                class="w-full rounded-xl border border-gray-300 bg-white px-4 py-3
                       focus:outline-none focus:ring-2 focus:ring-[#C7E6FF]"
              />
            </div>
          </div>

          <!-- Pictures -->
          <div>
            <label class="block text-sm font-medium mb-2" for="pictures">Pictures</label>
            <input
              id="pictures" name="pictures[]" type="file" accept="image/*" multiple
              class="w-full rounded-xl border border-gray-300 bg-white px-4 py-3
                     file:mr-4 file:rounded-lg file:border-0 file:bg-[#C7E6FF] file:px-4 file:py-2
                     file:font-medium file:text-gray-800 hover:file:bg-[#B5DBF7]
                     focus:outline-none focus:ring-2 focus:ring-[#C7E6FF]"
            />
            <p class="text-xs text-gray-500 mt-2">
              You can upload multiple images. (We’ll store paths in DB later.)
            </p>
          </div>

          <!-- Description -->
          <div>
            <label class="block text-sm font-medium mb-2" for="description">Description</label>
            <textarea
              id="description" name="description" rows="5" required
              placeholder="Write a short description of the product..."
              class="w-full rounded-xl border border-gray-300 bg-white px-4 py-3
                     focus:outline-none focus:ring-2 focus:ring-[#C7E6FF]"
            ></textarea>
          </div>

          <!-- Actions -->
          <div class="flex flex-col sm:flex-row gap-3 sm:justify-end pt-2">
            <button type="reset"
              class="rounded-xl border border-[#D8C3A5] bg-white px-6 py-3 font-medium
                     hover:bg-[#FFF3B0] transition">
              Clear
            </button>

            <button type="submit"
              class="rounded-xl bg-[#C7E6FF] px-6 py-3 font-semibold
                     hover:bg-[#B5DBF7] transition shadow-sm">
              Save Product
            </button>
          </div>

        </form>
      </div>
    </div>

  </div>
</body>
</html>
